<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 • Page Not Found</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      background: #121212;
      border: 1px solid #2c2c2c;
      border-radius: 48px;
      padding: 3rem 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .icon-404 {
      font-size: 6rem;
      color: #ff7a00;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #ff7a00, #ff2a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #f0f0f0;
    }

    p {
      color: #aaa;
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #ff7a00;
      color: #000;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.2rem;
      transition: 0.2s;
      border: 2px solid #ff7a00;
    }

    .home-btn:hover {
      background: transparent;
      color: #ff7a00;
    }

    .home-btn i {
      transition: transform 0.2s;
    }

    .home-btn:hover i {
      transform: translateX(-4px);
    }

    .links {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      color: #888;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }

    .links a:hover {
      color: #ff7a00;
    }

    hr {
      border: none;
      height: 1px;
      background: #2c2c2c;
      margin: 2rem 0 1.5rem;
    }

    .footer-note {
      color: #555;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-404">
      <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h1>404</h1>
    <h2>page not found</h2>
    <p>The page you are looking for doesn't exist or has been moved. Let's get you back on track.</p>
    
    <a href="home.html" class="home-btn">
      <i class="fas fa-arrow-left"></i> Go Home
    </a>

    <hr>

    
  </div>
</body>
</html>
